name: Overall CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sanity-check:
    name: Repository Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for unresolved Git conflicts
        run: |
          echo "Scanning codebase for conflict markers..."
          # Search recursively for unresolved git merge conflict headers
          if grep -rn "^<<<<<<< " . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.expo; then
            echo "🚨 Error: Unresolved Git conflict markers found in the files listed above!"
            exit 1
          fi
          echo "Clean repository! No conflict markers found. ✅"
