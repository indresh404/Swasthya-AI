<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; }
  canvas { display: block; width: 100% !important; height: 100% !important; touch-action: none; }
  #loading {
    position: fixed; inset: 0; background: #050505;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; transition: opacity 0.5s ease;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .pulse-ring {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid #10b981; border-top-color: transparent;
    animation: spin 1s linear infinite;
  }
  .loading-text {
    margin-top: 16px; color: #10b981; font-family: sans-serif;
    font-size: 13px; letter-spacing: 1px; opacity: 0.8;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="pulse-ring"></div>
  <div class="loading-text">LOADING MODEL...</div>
</div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Post message bridge ────────────────────────────────────────────────────
function postToRN(data) {
  try {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify(data));
    }
  } catch(e) {}
}

// ─── Scene setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#050505');

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.0, 4.5);

// ─── Lights ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dir1 = new THREE.DirectionalLight(0xffffff, 1.2);
dir1.position.set(10, 10, 5);
scene.add(dir1);
const dir2 = new THREE.DirectionalLight(0xffffff, 0.6);
dir2.position.set(-10, 5, -5);
scene.add(dir2);
const pt = new THREE.PointLight(0xffffff, 1.0);
pt.position.set(0, 2, 3);
scene.add(pt);

// ─── Heat zone config (mirrors data/bodyZones.ts) ────────────────────────────
const HEAT_ZONES = [
  { id: 'head',           position: [0,    1.65,  0.05], color: '#ef4444', intensity: 0.85 },
  { id: 'neck',           position: [0,    1.45,  0.05], color: '#f97316', intensity: 0.60 },
  { id: 'left_shoulder',  position: [-0.22,1.3,   0.0 ], color: '#f97316', intensity: 0.55 },
  { id: 'right_shoulder', position: [0.22, 1.3,   0.0 ], color: '#f59e0b', intensity: 0.40 },
  { id: 'chest',          position: [0,    1.15,  0.1 ], color: '#ef4444', intensity: 0.75 },
  { id: 'upper_back',     position: [0,    1.2,  -0.12], color: '#f97316', intensity: 0.65 },
  { id: 'abdomen',        position: [0,    0.95,  0.1 ], color: '#f59e0b', intensity: 0.45 },
  { id: 'lower_back',     position: [0,    0.9,  -0.12], color: '#ef4444', intensity: 0.80 },
  { id: 'left_knee',      position: [-0.1, 0.45,  0.05], color: '#f97316', intensity: 0.50 },
  { id: 'right_knee',     position: [0.1,  0.45,  0.05], color: '#f59e0b', intensity: 0.35 },
];

const NUM_POINTS = HEAT_ZONES.length;

// ─── Heatmap shader material ──────────────────────────────────────────────────
const heatmapMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uHeatPoints:      { value: HEAT_ZONES.map(z => new THREE.Vector3(...z.position)) },
    uHeatColors:      { value: HEAT_ZONES.map(z => new THREE.Color(z.color)) },
    uHeatIntensities: { value: HEAT_ZONES.map(z => z.intensity) },
    uNumPoints:       { value: NUM_POINTS },
    uTime:            { value: 0 },
    uBaseColor:       { value: new THREE.Color('#e8e0d8') },
    uSelectedZone:    { value: -1 },
  },
  vertexShader: `
    varying vec3 vWorldPosition;
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPosition = worldPos.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3  uHeatPoints[${NUM_POINTS}];
    uniform vec3  uHeatColors[${NUM_POINTS}];
    uniform float uHeatIntensities[${NUM_POINTS}];
    uniform int   uNumPoints;
    uniform vec3  uBaseColor;
    uniform float uTime;
    uniform int   uSelectedZone;
    varying vec3  vWorldPosition;
    varying vec3  vNormal;

    void main() {
      float totalHeat = 0.0;
      vec3  heatColor = vec3(0.0);
      float dotNL = max(dot(vNormal, normalize(vec3(1.0, 1.0, 1.0))), 0.2);
      vec3  base  = uBaseColor * (0.85 + 0.15 * dotNL);

      for (int i = 0; i < ${NUM_POINTS}; i++) {
        float dist    = distance(vWorldPosition, uHeatPoints[i]);
        float radius  = 0.22;
        float falloff = exp(-pow(dist / radius, 2.0));
        float heat    = falloff * uHeatIntensities[i];

        // Boost selected zone
        if (uSelectedZone == i) {
          heat *= 1.6;
          float pulse = (sin(uTime * 5.0) * 0.5 + 0.5) * 0.3;
          heat += falloff * pulse;
        }

        totalHeat += heat;
        heatColor += uHeatColors[i] * heat;
      }

      vec3 finalColor = mix(base, heatColor, clamp(totalHeat, 0.0, 1.0));

      // Global ambient pulse
      float pulse = (sin(uTime * 3.5) * 0.5 + 0.5) * 0.12 * clamp(totalHeat * 2.0, 0.0, 1.0);
      finalColor += heatColor * pulse;

      // Fresnel rim for sci-fi look
      vec3 viewDir = normalize(cameraPosition - vWorldPosition);
      float rim = 1.0 - max(dot(viewDir, vNormal), 0.0);
      rim = pow(rim, 3.0) * 0.15;
      finalColor += vec3(0.1, 0.9, 0.5) * rim;

      gl_FragColor = vec4(finalColor, 1.0);
    }
  `,
});

// ─── GLTFLoader polyfill (inline minimal OBJ fallback + GLB load) ─────────────
// We use THREE.GLTFLoader via a dynamic approach. Since CDN has r128,
// we load from the same base URL the HTML is served from (assets/heatmap/).
const loaderScript = document.createElement('script');

// THREE r128 doesn't bundle GLTFLoader in the minified build.
// We implement a minimal inline GLTFLoader compatible approach:
// Load the model using fetch + parse manually, or use the GLTFLoader from jsDelivr.
loaderScript.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
loaderScript.onload = () => initModel();
loaderScript.onerror = () => {
  // Fallback: create a simple mannequin from primitives
  initFallbackModel();
};
document.head.appendChild(loaderScript);

let modelGroup = null;
let orbitTarget = new THREE.Vector3(0, 1.0, 0);

// ─── Orbit controls (manual implementation) ──────────────────────────────────
let isDragging = false;
let lastX = 0;
let sphericalTheta = 0;   // horizontal angle
const sphericalPhi = Math.PI / 2; // lock vertical rotation for a clean 360 spin
let sphericalRadius = 4.5;
const AUTO_ROTATE_SPEED = 0.003;
let autoRotate = true;

function updateCamera() {
  const x = orbitTarget.x + sphericalRadius * Math.sin(sphericalPhi) * Math.sin(sphericalTheta);
  const y = orbitTarget.y + sphericalRadius * Math.cos(sphericalPhi);
  const z = orbitTarget.z + sphericalRadius * Math.sin(sphericalPhi) * Math.cos(sphericalTheta);
  camera.position.set(x, y, z);
  camera.lookAt(orbitTarget);
}

// Touch / pointer events
canvas.addEventListener('pointerdown', e => {
  isDragging = true;
  lastX = e.clientX;
  autoRotate = false;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  sphericalTheta -= dx * 0.008;
  lastX = e.clientX;
  updateCamera();
});
canvas.addEventListener('pointerup', () => { isDragging = false; });
canvas.addEventListener('pointercancel', () => { isDragging = false; });

// Pinch zoom
let lastPinchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    sphericalRadius = Math.max(2, Math.min(8, sphericalRadius - (dist - lastPinchDist) * 0.02));
    lastPinchDist = dist;
    updateCamera();
  }
}, { passive: true });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  autoRotate = false;
  sphericalRadius = Math.max(2.1, Math.min(8.5, sphericalRadius + e.deltaY * 0.0035));
  updateCamera();
}, { passive: false });

// ─── Messages from React Native ──────────────────────────────────────────────
window.clearSelection = function() {
  heatmapMaterial.uniforms.uSelectedZone.value = -1;
};

// ─── Model init ──────────────────────────────────────────────────────────────
function applyMaterial(obj) {
  obj.traverse(child => {
    if (child.isMesh) {
      child.material = heatmapMaterial;
      child.castShadow = false;
    }
  });
}

function centerModel(group) {
  const box = new THREE.Box3().setFromObject(group);
  const center = new THREE.Vector3();
  box.getCenter(center);
  group.position.sub(center);
  // Position model so feet are at y=0, center of model is at orbit target
  const size = new THREE.Vector3();
  box.getSize(size);
  group.position.y += size.y / 2;
  orbitTarget.set(0, size.y * 0.5, 0);
  sphericalRadius = Math.max(3.5, size.y * 1.8);
  updateCamera();
}

function initModel() {
  const loader = new THREE.GLTFLoader();
  loader.load(
    'model.glb',
    (gltf) => {
      modelGroup = gltf.scene;
      modelGroup.scale.setScalar(1);
      applyMaterial(modelGroup);
      centerModel(modelGroup);
      scene.add(modelGroup);
      hideLoader();
      postToRN({ type: 'MODEL_LOADED' });
    },
    (xhr) => {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      const el = document.querySelector('.loading-text');
      if (el) el.textContent = `LOADING ${pct}%`;
    },
    (err) => {
      console.warn('GLB load failed, using fallback', err);
      initFallbackModel();
    }
  );
}

function initFallbackModel() {
  // Simple stick-figure mannequin from primitives
  const group = new THREE.Group();
  const mat = heatmapMaterial;

  const addPart = (geo, x, y, z) => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    group.add(m);
  };

  // Head
  addPart(new THREE.SphereGeometry(0.12, 16, 16), 0, 1.72, 0);
  // Neck
  addPart(new THREE.CylinderGeometry(0.04, 0.05, 0.14, 12), 0, 1.56, 0);
  // Torso
  addPart(new THREE.CylinderGeometry(0.18, 0.15, 0.55, 16), 0, 1.17, 0);
  // Pelvis
  addPart(new THREE.CylinderGeometry(0.15, 0.12, 0.18, 16), 0, 0.85, 0);
  // Left upper arm
  addPart(new THREE.CylinderGeometry(0.045, 0.04, 0.3, 10), -0.28, 1.22, 0);
  // Right upper arm
  addPart(new THREE.CylinderGeometry(0.045, 0.04, 0.3, 10), 0.28, 1.22, 0);
  // Left forearm
  addPart(new THREE.CylinderGeometry(0.035, 0.03, 0.28, 10), -0.28, 0.88, 0);
  // Right forearm
  addPart(new THREE.CylinderGeometry(0.035, 0.03, 0.28, 10), 0.28, 0.88, 0);
  // Left thigh
  addPart(new THREE.CylinderGeometry(0.07, 0.06, 0.35, 12), -0.1, 0.6, 0);
  // Right thigh
  addPart(new THREE.CylinderGeometry(0.07, 0.06, 0.35, 12), 0.1, 0.6, 0);
  // Left shin
  addPart(new THREE.CylinderGeometry(0.05, 0.04, 0.35, 12), -0.1, 0.24, 0);
  // Right shin
  addPart(new THREE.CylinderGeometry(0.05, 0.04, 0.35, 12), 0.1, 0.24, 0);
  // Left foot
  addPart(new THREE.BoxGeometry(0.08, 0.04, 0.15), -0.1, 0.04, 0.05);
  // Right foot
  addPart(new THREE.BoxGeometry(0.08, 0.04, 0.15), 0.1, 0.04, 0.05);

  modelGroup = group;
  scene.add(group);
  orbitTarget.set(0, 0.9, 0);
  updateCamera();
  hideLoader();
  postToRN({ type: 'MODEL_LOADED' });
}

function hideLoader() {
  setTimeout(() => {
    const el = document.getElementById('loading');
    if (el) el.classList.add('hidden');
    setTimeout(() => { if (el) el.remove(); }, 600);
  }, 300);
}

// ─── Soft bloom via multi-pass (lightweight, no post-processing lib) ──────────
// We simulate bloom by rendering the scene twice: normal + additive blurred
// For mobile perf we just use a subtle glow via renderer tone mapping
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

// ─── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Render loop ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  heatmapMaterial.uniforms.uTime.value = t;

  if (autoRotate && !isDragging) {
    sphericalTheta += AUTO_ROTATE_SPEED;
    updateCamera();
  }

  renderer.render(scene, camera);
}

updateCamera();
animate();
</script>
</body>
</html>
